<svg style="filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));" width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b6b"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ecdc4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="#0f3460"/>

  <!-- ==================== ESP32 ==================== -->
  <rect x="340" y="180" width="220" height="280" rx="10" fill="#1a1a2e" stroke="#4ecdc4" stroke-width="2"/>
  <rect x="420" y="170" width="60" height="20" rx="4" fill="#333" stroke="#4ecdc4" stroke-width="1"/>
  <text x="450" y="184" text-anchor="middle" fill="#4ecdc4" font-size="9" font-weight="bold">USB</text>
  <text x="450" y="210" text-anchor="middle" fill="#4ecdc4" font-size="14" font-weight="bold">ESP32</text>
  <text x="450" y="226" text-anchor="middle" fill="#4ecdc4" font-size="10">DevKitC V4</text>

  <!-- ESP32 Left Pins -->
  <text x="355" y="260" fill="#aaa" font-size="10" font-family="monospace">3V3</text>
  <text x="355" y="280" fill="#aaa" font-size="10" font-family="monospace">GND</text>
  <text x="348" y="300" fill="#ffd93d" font-size="10" font-family="monospace">GP16</text>
  <text x="348" y="320" fill="#aaa" font-size="10" font-family="monospace" opacity="0.5">GP17</text>
  <text x="348" y="340" fill="#ffd93d" font-size="10" font-family="monospace">GP04</text>
  <text x="348" y="360" fill="#aaa" font-size="10" font-family="monospace" opacity="0.5">GP02</text>

  <!-- ESP32 Left Pin dots -->
  <circle cx="340" cy="256" r="4" fill="#ff6b6b"/>
  <circle cx="340" cy="276" r="4" fill="#555"/>
  <circle cx="340" cy="296" r="4" fill="#ffd93d"/>
  <circle cx="340" cy="316" r="4" fill="#555" opacity="0.3"/>
  <circle cx="340" cy="336" r="4" fill="#ffd93d"/>
  <circle cx="340" cy="356" r="4" fill="#555" opacity="0.3"/>

  <!-- ESP32 Right Pins -->
  <text x="495" y="260" fill="#aaa" font-size="10" font-family="monospace">VIN</text>
  <text x="495" y="280" fill="#aaa" font-size="10" font-family="monospace">GND</text>
  <text x="495" y="310" fill="#ff9f43" font-size="10" font-family="monospace">GP25</text>
  <text x="495" y="330" fill="#ff9f43" font-size="10" font-family="monospace">GP26</text>
  <text x="495" y="350" fill="#ff9f43" font-size="10" font-family="monospace">GP27</text>

  <!-- ESP32 Right Pin dots -->
  <circle cx="560" cy="256" r="4" fill="#ff6b6b"/>
  <circle cx="560" cy="276" r="4" fill="#555"/>
  <circle cx="560" cy="306" r="4" fill="#ff9f43"/>
  <circle cx="560" cy="326" r="4" fill="#ff9f43"/>
  <circle cx="560" cy="346" r="4" fill="#ff9f43"/>

  <!-- ==================== L298N ==================== -->
  <rect x="660" y="160" width="200" height="220" rx="10" fill="#1a1a2e" stroke="#ff9f43" stroke-width="2"/>
  <text x="760" y="185" text-anchor="middle" fill="#ff9f43" font-size="14" font-weight="bold">L298N</text>
  <text x="760" y="200" text-anchor="middle" fill="#ff9f43" font-size="10">Motor Driver</text>

  <!-- L298N Input Pins (left side) -->
  <text x="675" y="235" fill="#aaa" font-size="10" font-family="monospace">ENA</text>
  <text x="675" y="255" fill="#aaa" font-size="10" font-family="monospace">IN1</text>
  <text x="675" y="275" fill="#aaa" font-size="10" font-family="monospace">IN2</text>
  <text x="675" y="305" fill="#aaa" font-size="10" font-family="monospace">5V</text>
  <text x="675" y="325" fill="#aaa" font-size="10" font-family="monospace">GND</text>

  <circle cx="660" cy="231" r="4" fill="#ff9f43"/>
  <circle cx="660" cy="251" r="4" fill="#ff9f43"/>
  <circle cx="660" cy="271" r="4" fill="#ff9f43"/>
  <circle cx="660" cy="301" r="4" fill="#ff6b6b"/>
  <circle cx="660" cy="321" r="4" fill="#555"/>

  <!-- L298N Power (top) -->
  <text x="675" y="360" fill="#aaa" font-size="10" font-family="monospace">+12V</text>
  <text x="675" y="370" fill="#666" font-size="8">(external)</text>
  <circle cx="660" cy="356" r="4" fill="#ff6b6b"/>

  <!-- L298N Output Pins (right side) -->
  <text x="810" y="235" fill="#aaa" font-size="10" font-family="monospace">OUT1</text>
  <text x="810" y="255" fill="#aaa" font-size="10" font-family="monospace">OUT2</text>
  <circle cx="860" cy="231" r="4" fill="#e74c3c"/>
  <circle cx="860" cy="251" r="4" fill="#555"/>

  <!-- ==================== Motor ==================== -->
  <rect x="680" y="430" width="160" height="80" rx="10" fill="#1a1a2e" stroke="#e74c3c" stroke-width="2"/>
  <text x="760" y="465" text-anchor="middle" fill="#e74c3c" font-size="13" font-weight="bold">JGB37-555</text>
  <text x="760" y="483" text-anchor="middle" fill="#e74c3c" font-size="10">DC12V 167RPM</text>
  <!-- Motor shaft -->
  <rect x="670" y="455" width="20" height="10" rx="3" fill="#666"/>

  <!-- Motor wires from L298N -->
  <line x1="860" y1="231" x2="880" y2="231" stroke="#e74c3c" stroke-width="2"/>
  <line x1="880" y1="231" x2="880" y2="440" stroke="#e74c3c" stroke-width="2"/>
  <line x1="880" y1="440" x2="840" y2="440" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="840" cy="440" r="3" fill="#e74c3c"/>
  <text x="883" y="350" fill="#e74c3c" font-size="9" transform="rotate(90,883,350)">RED (+)</text>

  <line x1="860" y1="251" x2="890" y2="251" stroke="#888" stroke-width="2"/>
  <line x1="890" y1="251" x2="890" y2="500" stroke="#888" stroke-width="2"/>
  <line x1="890" y1="500" x2="840" y2="500" stroke="#888" stroke-width="2"/>
  <circle cx="840" cy="500" r="3" fill="#888"/>
  <text x="893" y="380" fill="#888" font-size="9" transform="rotate(90,893,380)">BLACK (-)</text>

  <!-- ==================== TOF250 #1 (Entry) ==================== -->
  <rect x="40" y="220" width="170" height="100" rx="10" fill="#1a1a2e" stroke="#a8e6cf" stroke-width="2"/>
  <text x="125" y="248" text-anchor="middle" fill="#a8e6cf" font-size="13" font-weight="bold">TOF250 #1</text>
  <text x="125" y="265" text-anchor="middle" fill="#a8e6cf" font-size="10">Entry Sensor (input)</text>

  <!-- TOF250 #1 Pins -->
  <text x="175" y="290" fill="#aaa" font-size="10" font-family="monospace" text-anchor="end">VCC</text>
  <text x="175" y="308" fill="#aaa" font-size="10" font-family="monospace" text-anchor="end">GND</text>
  <circle cx="210" cy="286" r="4" fill="#ff6b6b"/>
  <circle cx="210" cy="304" r="4" fill="#555"/>

  <text x="80" y="290" fill="#aaa" font-size="10" font-family="monospace">TX</text>
  <text x="80" y="308" fill="#aaa" font-size="10" font-family="monospace" opacity="0.5">RX</text>
  <circle cx="40" cy="286" r="4" fill="#ffd93d"/>
  <circle cx="40" cy="304" r="4" fill="#555" opacity="0.3"/>

  <!-- ==================== TOF250 #2 (Exit) ==================== -->
  <rect x="40" y="370" width="170" height="100" rx="10" fill="#1a1a2e" stroke="#a8e6cf" stroke-width="2"/>
  <text x="125" y="398" text-anchor="middle" fill="#a8e6cf" font-size="13" font-weight="bold">TOF250 #2</text>
  <text x="125" y="415" text-anchor="middle" fill="#a8e6cf" font-size="10">Exit Sensor (output)</text>

  <!-- TOF250 #2 Pins -->
  <text x="175" y="440" fill="#aaa" font-size="10" font-family="monospace" text-anchor="end">VCC</text>
  <text x="175" y="458" fill="#aaa" font-size="10" font-family="monospace" text-anchor="end">GND</text>
  <circle cx="210" cy="436" r="4" fill="#ff6b6b"/>
  <circle cx="210" cy="454" r="4" fill="#555"/>

  <text x="80" y="440" fill="#aaa" font-size="10" font-family="monospace">TX</text>
  <text x="80" y="458" fill="#aaa" font-size="10" font-family="monospace" opacity="0.5">RX</text>
  <circle cx="40" cy="436" r="4" fill="#ffd93d"/>
  <circle cx="40" cy="454" r="4" fill="#555" opacity="0.3"/>

  <!-- ==================== WIRES ==================== -->

  <!-- ESP32 GP25 → L298N ENA (orange) -->
  <line x1="560" y1="306" x2="660" y2="231" stroke="#ff9f43" stroke-width="2.5" stroke-dasharray="none"/>
  <text x="605" y="260" fill="#ff9f43" font-size="8" text-anchor="middle">PWM</text>

  <!-- ESP32 GP26 → L298N IN1 (orange) -->
  <line x1="560" y1="326" x2="660" y2="251" stroke="#ff9f43" stroke-width="2.5"/>

  <!-- ESP32 GP27 → L298N IN2 (orange) -->
  <line x1="560" y1="346" x2="660" y2="271" stroke="#ff9f43" stroke-width="2.5"/>

  <!-- ESP32 GND (right) → L298N GND -->
  <line x1="560" y1="276" x2="610" y2="276" stroke="#555" stroke-width="2"/>
  <line x1="610" y1="276" x2="610" y2="321" stroke="#555" stroke-width="2"/>
  <line x1="610" y1="321" x2="660" y2="321" stroke="#555" stroke-width="2"/>

  <!-- TOF250 #1 VCC → ESP32 3V3 (red) -->
  <line x1="210" y1="286" x2="260" y2="286" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="260" y1="286" x2="260" y2="256" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="260" y1="256" x2="340" y2="256" stroke="#ff6b6b" stroke-width="2"/>

  <!-- TOF250 #1 GND → ESP32 GND (black) -->
  <line x1="210" y1="304" x2="270" y2="304" stroke="#555" stroke-width="2"/>
  <line x1="270" y1="304" x2="270" y2="276" stroke="#555" stroke-width="2"/>
  <line x1="270" y1="276" x2="340" y2="276" stroke="#555" stroke-width="2"/>

  <!-- TOF250 #1 TX → ESP32 GP16 (yellow) -->
  <line x1="40" y1="286" x2="20" y2="286" stroke="#ffd93d" stroke-width="2.5"/>
  <line x1="20" y1="286" x2="20" y2="160" stroke="#ffd93d" stroke-width="2.5"/>
  <line x1="20" y1="160" x2="320" y2="160" stroke="#ffd93d" stroke-width="2.5"/>
  <line x1="320" y1="160" x2="320" y2="296" stroke="#ffd93d" stroke-width="2.5"/>
  <line x1="320" y1="296" x2="340" y2="296" stroke="#ffd93d" stroke-width="2.5"/>
  <text x="170" y="155" fill="#ffd93d" font-size="9" text-anchor="middle">UART1 RX (data)</text>

  <!-- TOF250 #2 VCC → ESP32 3V3 (red, shared) -->
  <line x1="210" y1="436" x2="250" y2="436" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="250" y1="436" x2="250" y2="256" stroke="#ff6b6b" stroke-width="2"/>
  <circle cx="250" cy="256" r="3" fill="#ff6b6b"/>

  <!-- TOF250 #2 GND → ESP32 GND (black, shared) -->
  <line x1="210" y1="454" x2="240" y2="454" stroke="#555" stroke-width="2"/>
  <line x1="240" y1="454" x2="240" y2="276" stroke="#555" stroke-width="2"/>
  <circle cx="240" cy="276" r="3" fill="#555"/>

  <!-- TOF250 #2 TX → ESP32 GP04 (yellow) -->
  <line x1="40" y1="436" x2="10" y2="436" stroke="#ffd93d" stroke-width="2.5"/>
  <line x1="10" y1="436" x2="10" y2="550" stroke="#ffd93d" stroke-width="2.5"/>
  <line x1="10" y1="550" x2="310" y2="550" stroke="#ffd93d" stroke-width="2.5"/>
  <line x1="310" y1="550" x2="310" y2="336" stroke="#ffd93d" stroke-width="2.5"/>
  <line x1="310" y1="336" x2="340" y2="336" stroke="#ffd93d" stroke-width="2.5"/>
  <text x="160" y="565" fill="#ffd93d" font-size="9" text-anchor="middle">UART2 RX (data)</text>

  <!-- ==================== Power Supply ==================== -->
  <rect x="660" y="530" width="160" height="70" rx="10" fill="#1a1a2e" stroke="#ff6b6b" stroke-width="2"/>
  <text x="740" y="560" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">DC 12V</text>
  <text x="740" y="578" text-anchor="middle" fill="#ff6b6b" font-size="10">Power Supply</text>
  <text x="710" y="593" fill="#ff6b6b" font-size="9">+</text>
  <text x="760" y="593" fill="#aaa" font-size="9">-</text>

  <!-- 12V → L298N +12V -->
  <line x1="700" y1="530" x2="700" y2="400" stroke="#ff6b6b" stroke-width="2.5"/>
  <line x1="700" y1="400" x2="640" y2="400" stroke="#ff6b6b" stroke-width="2.5"/>
  <line x1="640" y1="400" x2="640" y2="356" stroke="#ff6b6b" stroke-width="2.5"/>
  <line x1="640" y1="356" x2="660" y2="356" stroke="#ff6b6b" stroke-width="2.5"/>
  <text x="630" y="395" fill="#ff6b6b" font-size="9" text-anchor="end">+12V</text>

  <!-- 12V GND → L298N GND (shared) -->
  <line x1="760" y1="530" x2="760" y2="500" stroke="#555" stroke-width="2.5"/>
  <line x1="760" y1="500" x2="620" y2="500" stroke="#555" stroke-width="2.5"/>
  <line x1="620" y1="500" x2="620" y2="321" stroke="#555" stroke-width="2.5"/>
  <circle cx="620" cy="321" r="3" fill="#555"/>
  <text x="630" y="498" fill="#888" font-size="9" text-anchor="start">Common GND</text>

  <!-- ==================== Labels ==================== -->
  <rect x="30" y="20" width="840" height="50" rx="8" fill="#16213e" opacity="0.8"/>
  <text x="450" y="38" text-anchor="middle" fill="#ffd93d" font-size="11" font-weight="bold">
    Conveyor Belt Control System - Full Wiring Diagram
  </text>
  <text x="450" y="56" text-anchor="middle" fill="#aaa" font-size="10">
    ESP32 DevKitC V4 + L298N Motor Driver + TOF250 x2 + JGB37-555 DC Motor
  </text>

  <!-- Junction dots for shared lines -->
  <circle cx="260" cy="256" r="3" fill="#ff6b6b"/>
  <circle cx="270" cy="276" r="3" fill="#555"/>

  <!-- Dim labels for unused pins -->
  <text x="348" y="320" fill="#555" font-size="8" font-family="monospace">(unused)</text>
  <text x="348" y="360" fill="#555" font-size="8" font-family="monospace">(unused)</text>

</svg>