constitution:
    coverage_exemptions:
        enabled: false
        max_exempt_percentage: 5
        require_justification: true
    ddd_settings:
        behavior_snapshots: true
        characterization_tests: true
        max_transformation_size: small
        preserve_before_improve: true
        require_existing_tests: true
    development_mode: tdd
    enforce_quality: true
    lsp_integration:
        diagnostic_sources: []
        regression_detection:
            error_increase_threshold: 0
            type_error_increase_threshold: 0
            warning_increase_threshold: 0
        trust5_integration:
            readable: []
            secured: []
            tested: []
            trackable: []
            understandable: []
    lsp_quality_gates:
        cache_ttl_seconds: 0
        enabled: false
        plan:
            require_baseline: false
        run:
            allow_regression: false
            max_errors: 0
            max_lint_errors: 0
            max_type_errors: 0
        sync:
            max_errors: 0
            max_warnings: 0
            require_clean_lsp: false
        timeout_seconds: 0
    principles:
        simplicity:
            max_parallel_tasks: 0
    tdd_settings:
        min_coverage_per_commit: 80
        mutation_testing_enabled: false
        red_green_refactor: true
        test_first_required: true
    test_coverage_target: 85
    test_quality:
        avoid_implementation_coupling: false
        meaningful_assertions: false
        mutation_testing_enabled: false
        specification_based: false
